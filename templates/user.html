{% extends "base.html" %}

{% block title %}Dados - Sakura Sushi{% endblock %}

{% block content %}
<section class="page-header">
    <h1>👤 Seus Dados</h1>
    <p>Informe seus dados para entrega</p>
</section>

<section class="form-section">
    <form id="userForm" class="user-form">
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" required 
                   placeholder="Digite seu nome completo"
                   minlength="3">
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" required 
                   placeholder="(11) 99999-9999"
                   maxlength="15">
        </div>
        
        <div class="form-group">
            <label for="endereco">Endereço de Entrega *</label>
            <input type="text" id="endereco" name="endereco" required 
                   placeholder="Rua, número, bairro"
                   minlength="10">
        </div>
        
        <div class="form-group">
            <label for="complemento">Complemento (opcional)</label>
            <input type="text" id="complemento" name="complemento" 
                   placeholder="Apto, bloco, referência">
        </div>
        
        <div class="form-group">
            <label for="observacoes">Observações (opcional)</label>
            <textarea id="observacoes" name="observacoes" rows="3"
                      placeholder="Alguma observação sobre o pedido?"></textarea>
        </div>
    </form>
</section>

<div class="nav-buttons">
    <a href="/carrinho" class="btn-secondary">← Voltar ao Carrinho</a>
    <button class="btn-primary" onclick="saveAndContinue()">Continuar →</button>
</div>

{% endblock %}

{% block scripts %}
<script>
// Máscara de telefone
document.getElementById('telefone').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length <= 10) {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{4})(\d)/, '$1-$2');
    } else {
        value = value.replace(/(\d{2})(\d)/, '($1) $2');
        value = value.replace(/(\d{5})(\d)/, '$1-$2');
    }
    e.target.value = value;
});

// Carregar dados salvos
const savedUser = JSON.parse(localStorage.getItem('userData') || '{}');
if (savedUser.nome) document.getElementById('nome').value = savedUser.nome;
if (savedUser.telefone) document.getElementById('telefone').value = savedUser.telefone;
if (savedUser.endereco) document.getElementById('endereco').value = savedUser.endereco;
if (savedUser.complemento) document.getElementById('complemento').value = savedUser.complemento;
if (savedUser.observacoes) document.getElementById('observacoes').value = savedUser.observacoes;

function saveAndContinue() {
    const form = document.getElementById('userForm');
    
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    
    const userData = {
        nome: document.getElementById('nome').value,
        telefone: document.getElementById('telefone').value,
        endereco: document.getElementById('endereco').value,
        complemento: document.getElementById('complemento').value,
        observacoes: document.getElementById('observacoes').value
    };
    
    localStorage.setItem('userData', JSON.stringify(userData));
    window.location.href = '/pagamento';
}
</script>
{% endblock %}
